# Wazuh VM static network config.
# Place at /etc/netplan/00-installer-config.yaml then run: sudo netplan apply
# Interface names may differ (check `ip a`): enp0s3 = SIEM NIC, enp0s8 = host-only.
network:
  version: 2
  ethernets:
    enp0s3:                      # SIEM segment (agents reach the manager here)
      addresses: [10.10.30.10/24]
      routes:
        - to: default
          via: 10.10.30.1
      nameservers:
        addresses: [1.1.1.1, 8.8.8.8]
    enp0s8:                      # VirtualBox host-only (dashboard access from the Kali host)
      addresses: [192.168.56.20/24]
